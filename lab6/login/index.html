<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="UTF-8">
        <link href="../css/style.css" rel="stylesheet">
        <title>Login</title>
    </head>
    <body>
        <div class="login-container">       
            <div class="login-media">
                <img class="login-image" src="../images/login_image.png" alt="Логин">
                <h1 class="login-header">Войти</h1>
            </div>
            <div class="login-form">
                <p>Электропочта</p>
                <input name="Login" class="login-input" type="text">
                <label>Введите электронную почту в формате ******@***.**</label>
                <p>Пароль</p>
                <div class="input-wrapper">
                    <input name="Password" class="login-input" type="password">
                    <button class="show-password-button">
                        <img class="eye-icon" src="../images/icons/Eye_off_24.png" width="24" height="24" alt="Скрыть">   
                    </button>
                </div>           
                <button class="login-button">Продолжить</button>
            </div>
        </div>
    </body>
</html>
