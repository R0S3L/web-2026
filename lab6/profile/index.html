<!DOCTYPE html>
<html lang="ru">
    <head>
        <title>Profile</title>
        <meta charset="utf-8">
        <link href="../css/style.css" rel="stylesheet">
    </head>
    <body class="block">
        <nav class="side-panel">
            <button class="side-panel-button">
                <img class="side-panel-icon" src="../images/icons/home.png" width="24" height="24" alt="Дом">
            </button>
            <button class="side-panel-button">
                <img class="side-panel-icon" src="../images/icons/user.png" width="24" height="24" alt="Профиль">
                <img class="icons dot" src="../images/icons/dot.png" alt="Dot">
            </button>   
            <button class="side-panel-button">
                <img class="side-panel-icon" src="../images/icons/plus.png" width="24" height="24" alt="Содать">
            </button>
        </nav>
        <div class="profile-wrapper">
            <img src="../images/user_first.png" class="profile pic" alt="Аватар">
            <h2 class="profile name">Ваня Денисов</h2>
            <h3 class="profile description">Привет! Я системный аналитик в ACME :) 
                Тут моя жизнь только для самых классных!</h3>
            <div class="profile pic_counter">
                <img src="../images/icons/pic_icon.png" alt="Кол-во" class="profile pic_counter icon">
                <h3 class="profile pic_counter text">43 поста</h3>
            </div>
            <div class="profile content">
                <img src="../images/block_3.png" alt="Пост 1" class="profile photos">
                <img src="../images/cola.png" alt="Пост 2" class="profile photos">
                <img src="../images/cake.png" alt="Пост 3" class="profile photos">
            </div>
            <div class="profile content">
                <img src="../images/party.png" alt="Пост 4" class="profile photos">
                <img src="../images/bag.png" alt="Пост 5" class="profile photos">
                <img src="../images/book.png" alt="Пост 6" class="profile photos">
            </div>
            <div class="profile content">
                <img src="../images/friends.png" alt="Пост 7" class="profile photos">
                <img src="../images/street.png" alt="Пост 9" class="profile photos">
                <img src="../images/shop.png" alt="Пост 9" class="profile photos">
            </div>
        </div>
    </body>
</html>
