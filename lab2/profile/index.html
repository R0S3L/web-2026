<!DOCTYPE html>
<html>
    <head>
        <title>Profile</title>
        <meta charset="utf-8">
        <link href="../css/style.css" rel="stylesheet">
        </style>
    </head>
    <body class="block">
         <nav class="side-panel">
            <button class="side-panel-button">
                <img class="side-panel-icon" src="../images/icons/home.png" width="24px" height="24px">
            </button>
            <button class="side-panel-button">
                <img class="side-panel-icon" src="../images/icons/user.png" width="24px" height="24px">
                <img class="side-panel-icon" src="../images/icons/dot.png" alt="Dot" class="icons dot">
            </button>   
            <button class="side-panel-button">
                <img class="side-panel-icon" src="../images/icons/plus.png" width="24px" height="24px">
            </button>
        </nav>
       <div style="width: 1621.65px; height: 329px; margin-top: 73px;">
            <img src="../images/user_first.png" class="profile pic">
            <h2 class="profile name">Ваня Денисов</h2>
            <h3 class="profile description">Привет! Я системный аналитик в ACME :) 
                Тут моя жизнь только для самых классных!</h3>
            <div class="profile pic_counter">
                <img src="../images/icons/pic_icon.png" alt="Picture icon" class="profile pic_counter icon">
                <h3 class="profile pic_counter text">43 поста</h3>
            </div>
            <div class="profile content" style="margin-top: 42px;">
                <img src="../images/block_3.png" alt="Block" class="profile photos">
                <img src="../images/cola.png" alt="Cola" class="profile photos">
                <img src="../images/cake.png" alt="Cake" class="profile photos">
            </div>
            <div class="profile content">
                <img src="../images/party.png" alt="Party" class="profile photos">
                <img src="../images/bag.png" alt="Bag" class="profile photos">
                <img src="../images/book.png" alt="Book" class="profile photos">
            </div>
            <div class="profile content">
                <img src="../images/friends.png" alt="Friends" class="profile photos">
                <img src="../images/street.png" alt="Street" class="profile photos">
                <img src="../images/shop.png" alt="Table" class="profile photos">
            </div>     
       </div>
    </body>
</html>
